create_reservation:
  name: Create Reservation
  description: Create a Deskbee booking for a specific place and time window.
  fields:
    place_uuids:
      name: Place UUIDs
      description: >
        Ordered list of place UUIDs to try (desk, parking spot, etc.).
        The first successful booking wins; remaining UUIDs are skipped.
      required: true
      selector:
        object:
    date:
      name: Date
      description: Date of the reservation.
      required: true
      selector:
        date:
    start_time:
      name: Start time
      description: Time the reservation begins.
      required: false
      default: "08:30:00"
      selector:
        time:
    end_time:
      name: End time
      description: Time the reservation ends.
      required: false
      default: "17:00:00"
      selector:
        time:
    reason:
      name: Reason
      description: Optional reason for the booking.
      required: false
      default: ""
      selector:
        text: