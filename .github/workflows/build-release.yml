name: Build Deskbee Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Package integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir -p dist
          cp -r custom_components/deskbee dist/deskbee
          cd dist
          zip -r deskbee.zip deskbee

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskbee-integration
          path: dist/deskbee.zip

      - name: Set release tag
        id: vars
        run: echo "tag=auto-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Deskbee auto build ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/deskbee.zip
